<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتاق گفتگو</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #eef1f4; margin: 0; padding: 0; display: flex; justify-content: center; }
        .chat-wrapper { width: 100%; max-width: 480px; height: 100vh; background: #f4f4f7; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        
        .chat-header { background: #ffffff; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e6e6e6; }
        .user-details { display: flex; align-items: center; gap: 10px; }
        .user-details img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }
        .back-link { background: #0088cc; color: white; text-decoration: none; padding: 6px 14px; border-radius: 20px; font-size: 13px; }

        #chat-log { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: linear-gradient(to bottom, #f4f4f7, #e9ebf0); }
        .msg-box { max-width: 78%; padding: 10px 12px; border-radius: 15px; font-size: 14px; line-height: 1.45; position: relative; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.07); }
        
        .my-msg { background: #e1f5fe; color: #0d47a1; align-self: flex-start; border-top-right-radius: 2px; }
        .other-msg { background: #ffffff; color: #333; align-self: flex-end; border-top-left-radius: 2px; }
        
        .msg-sender { font-weight: bold; font-size: 11px; margin-bottom: 3px; display: block; color: #555; }
        .meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 10px; margin-top: 5px; opacity: 0.7; gap: 15px; }
        
        .del-msg-btn { background: none; border: none; color: #d32f2f; cursor: pointer; font-size: 10px; font-weight: bold; padding: 0; text-decoration: underline; }

        .typing-box { padding: 4px 15px; font-size: 12px; color: #777; font-style: italic; background: #ffffff; min-height: 22px; border-top: 1px solid #eee; }
        .input-bar { padding: 10px; background: white; display: flex; gap: 8px; align-items: center; border-top: 1px solid #eee; }
        #chat-message-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 14px; background: #f9f9f9; }
        #chat-message-submit { background: #0088cc; color: white; border: none; padding: 11px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <div class="chat-header">
        <div class="user-details">
            {% if chat_partner %}
                <img src="{{ chat_partner.profile.avatar.url }}" alt="Avatar">
                <div>
                    <strong style="font-size:15px;">{{ chat_partner.username }}</strong>
                    <div style="font-size:11px; color:#777;">{{ chat_partner.profile.bio }}</div>
                </div>
            {% else %}
                <div><strong style="font-size:15px;">👥 گروه: {{ room.display_name }}</strong></div>
            {% endif %}
        </div>
        <a href="{% url 'chat:index' %}" class="back-link">بازگشت</a>
    </div>

    <div id="chat-log"></div>
    <div id="typing-indicator" class="typing-box"></div>

    <div class="input-bar">
        <input id="chat-message-input" type="text" placeholder="پیام خود را بنویسید..." autocomplete="off">
        <button id="chat-message-submit">ارسال</button>
    </div>
</div>

<script>
    const roomName = "{{ room_name }}";
    const currentUser = "{{ request.user.username }}";
    
    const chatLog = document.querySelector('#chat-log');
    const typingIndicator = document.querySelector('#typing-indicator');
    const messageInput = document.querySelector('#chat-message-input');
    let typingTimeout;

    // Connect WebSocket
    const wsScheme = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
    const chatSocket = new WebSocket(wsScheme + window.location.host + '/ws/chat/' + roomName + '/');

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        
        if (data.action === 'history') {
            chatLog.innerHTML = '';
            data.history.forEach(msg => {
                appendMessage(msg.id, msg.username, msg.message, msg.timestamp);
            });
        } 
        else if (data.action === 'message') {
            appendMessage(data.message_id, data.username, data.message, data.timestamp);
            typingIndicator.innerText = "";
        } 
        else if (data.action === 'delete') {
            const targetMsg = document.getElementById(`msg-${data.message_id}`);
            if (targetMsg) targetMsg.remove();
        }
        else if (data.action === 'typing' && data.username !== currentUser) {
            typingIndicator.innerText = data.is_typing ? `${data.username} در حال نوشتن...` : "";
        }
    };

    function appendMessage(id, username, message, timestamp) {
        const isMe = (username === currentUser);
        const msgClass = isMe ? 'my-msg' : 'other-msg';
        const deleteHtml = isMe ? `<button class="del-msg-btn" onclick="deleteMessageFromServer(${id})">حذف</button>` : '';

        const messageElement = document.createElement('div');
        messageElement.className = `msg-box ${msgClass}`;
        messageElement.id = `msg-${id}`;
        messageElement.innerHTML = `
            <span class="msg-sender">${username}</span>
            <div>${message}</div>
            <div class="meta-row">
                <span style="color:#888;">${timestamp}</span>
                ${deleteHtml}
            </div>
        `;
        chatLog.appendChild(messageElement);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    window.deleteMessageFromServer = function(messageId) {
        if (confirm("آیا مایلید این پیام برای همیشه پاک شود؟")) {
            chatSocket.send(JSON.stringify({ 
                'action': 'delete_message', 
                'message_id': messageId 
            }));
        }
    };

    function handleSend() {
        const message = messageInput.value;
        if (message.trim() === '') return;
        
        chatSocket.send(JSON.stringify({ 'action': 'message', 'message': message }));
        messageInput.value = '';
        chatSocket.send(JSON.stringify({ 'action': 'typing', 'is_typing': false }));
    }

    document.querySelector('#chat-message-submit').onclick = handleSend;

    messageInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });

    messageInput.addEventListener('input', function() {
        chatSocket.send(JSON.stringify({ 'action': 'typing', 'is_typing': true }));
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            chatSocket.send(JSON.stringify({ 'action': 'typing', 'is_typing': false }));
        }, 1500);
    });
</script>
</body>
</html>
